
{{ if and .Values.controller.enabled .Values.controller.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubocd-allow-sources-fetch
  namespace: {{ .Values.controller.networkPolicies.fluxNamespace }}
spec:
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 9090
          protocol: TCP
  podSelector:
    matchLabels:
      app: source-controller
  policyTypes:
    - Ingress
{{ end }}
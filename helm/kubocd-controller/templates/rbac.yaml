
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubocd-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubocd-controller.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubocd-controller.clusterRoleName" .}}
  labels:
    {{- include "kubocd-controller.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups:
      - kubocd.kubotal.io
    resources:
      - releases
    verbs:
      - get
      - list
      - watch
      - patch
      - update
  - apiGroups:
      - kubocd.kubotal.io
    resources:
      - settings
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kubocd.kubotal.io
    resources:
      - releases/finalizers
    verbs:
      - update
  - apiGroups:
      - kubocd.kubotal.io
    resources:
      - releases/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - source.toolkit.fluxcd.io
    resources:
      - helmrepositories
      - ocirepositories
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - patch
      - update
  - apiGroups:
      - helm.toolkit.fluxcd.io
      - helm.toolkit.fluxcd.io
    resources:
      - helmreleases
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - patch
      - update
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubocd-controller.serviceAccountName" . }}-{{ include "kubocd-controller.clusterRoleName" .}}-binding
  labels:
    {{- include "kubocd-controller.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubocd-controller.clusterRoleName" .}}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubocd-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

{{ if and .Values.metrics.enabled .Values.metrics.secured }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubocd-controller.clusterRoleName" .}}-metrics-auth
  labels:
    {{- include "kubocd-controller.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubocd-controller.clusterRoleName" .}}-metrics-reader
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubocd-controller.serviceAccountName" . }}-{{ include "kubocd-controller.clusterRoleName" .}}-metrics-auth
  labels:
    {{- include "kubocd-controller.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubocd-controller.clusterRoleName" .}}-metrics-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "kubocd-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

{{ end }}



---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.1
  name: contexts.kubocd.kubotal.io
spec:
  group: kubocd.kubotal.io
  names:
    kind: Context
    listKind: ContextList
    plural: contexts
    shortNames:
    - ctx
    - kcontext
    - kctx
    singular: context
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.description
      name: Description
      type: string
    - jsonPath: .status.parents
      name: Parents
      type: string
    - jsonPath: .status.phase
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Context is the Schema for the settings API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ContextSpec defines the desired state of Context.
            properties:
              abstract:
                description: |-
                  If true, to be used as a parent and not candidate to be referenced from a Release.
                  This is NOT enforced by the controller, but just for the usage of a potential front end
                  Default: false
                type: boolean
              context:
                description: |-
                  Context is a map of variables witches will be injected in the data model when rendering Application template.
                  When merging setting, context merge is performed by patching 'oldest' one with the 'newest' one.
                  The 'oldest' are the deeper in the parents chain.
                  Then merging is performed with the parent array order.
                x-kubernetes-preserve-unknown-fields: true
              description:
                description: Short description. Single line only
                type: string
              parents:
                description: |-
                  Context can be merged together.
                  See each property description for more detail.
                  Default: []
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              protected:
                description: |-
                  If true, the webhook will prevent deletion
                  Default: false
                type: boolean
            type: object
          status:
            description: ContextStatus defines the observed state of Context.
            properties:
              context:
                description: |-
                  Context is the resulting context, after potential parent merging
                  if there is no parent, it is empty, so use the one from Spec.
                x-kubernetes-preserve-unknown-fields: true
              parents:
                description: |-
                  Parents is a string to list our parents. Not technically used, but intended to be displayed
                  as printcolumn
                type: string
              phase:
                type: string
            required:
            - phase
            type: object
        type: object

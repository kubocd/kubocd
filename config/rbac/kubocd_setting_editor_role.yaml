# This rule is not used by the project kubocd itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the kubocd.kubotal.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubocd
    app.kubernetes.io/managed-by: kustomize
  name: kubocd-setting-editor-role
rules:
- apiGroups:
  - kubocd.kubotal.io
  resources:
  - settings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kubocd.kubotal.io
  resources:
  - settings/status
  verbs:
  - get

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.1
  name: configs.kubocd.kubotal.io
spec:
  group: kubocd.kubotal.io
  names:
    kind: Config
    listKind: ConfigList
    plural: configs
    shortNames:
    - kconfig
    - kconf
    singular: config
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Config is the Schema for the Configs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConfigSpec defines the desired state of Config.
            properties:
              clusterRoles:
                description: |-
                  Allow to define Roles already provided by the k8s cluster, independently of any KuboCD deployment.
                  When merging, values are appended
                  Default: []
                items:
                  type: string
                type: array
              defaultContexts:
                description: |-
                  Define context which will be added to all release, except the one with 'skipDefaultContext' flag
                  Default: []
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              defaultNamespaceContexts:
                description: |-
                  Define a list of context name which will be added to all releases located in a namespace,
                  except the one with 'skipDefaultContext' flag
                items:
                  type: string
                type: array
              imageRedirects:
                description: |-
                  This may apply to image referenced in Helm Chart
                  It is intended to be used by some templating functions, inserted in the `values` template of the package
                  Each entry allow substitution of oci data source.
                  Aim is to ease handling of Air Gap deployment, to replace public repo be an internal ones.
                  This will also allow to add authentication information.
                  When merging Configs, values are simply appended. (Configs are sorted by name)
                  Default: []
                items:
                  properties:
                    imagePullPolicy:
                      enum:
                      - IfNotPresent
                      - Always
                      - Never
                      type: string
                    imagePullSecrets:
                      items:
                        type: string
                      type: array
                    newPrefix:
                      description: The prefix part will be replaced by this value.
                      type: string
                    oldPrefix:
                      description: All image repo where the Url begin by this value
                        will be impacted.
                      type: string
                  required:
                  - newPrefix
                  - oldPrefix
                  type: object
                type: array
              packageRedirects:
                description: |-
                  This will apply to KuboCD package oci image.
                  Each entry allow substitution of oci data source.
                  Aim is to ease handling of Air Gap deployment, to replace public repo be an internal ones.
                  This will also allow to add authentication and proxy information.
                  When merging Configs, values are simply appended. (Configs are sorted by name)
                  Default: []
                items:
                  properties:
                    certSecretRef:
                      description: |-
                        CertSecretRef can be given the name of a Secret containing
                        either or both of

                        - a PEM-encoded client certificate (`tls.crt`) and private
                        key (`tls.key`);
                        - a PEM-encoded CA certificate (`ca.crt`)

                        and whichever are supplied, will be used for connecting to the
                        registry. The client cert and key are useful if you are
                        authenticating with a certificate; the CA cert is useful if
                        you are using a self-signed server certificate. The Secret must
                        be of type `Opaque` or `kubernetes.io/tls`.

                        Note: Support for the `caFile`, `certFile` and `keyFile` keys have
                        been deprecated.
                      properties:
                        name:
                          description: Name of the referent.
                          type: string
                      required:
                      - name
                      type: object
                    ignore:
                      description: |-
                        Ignore overrides the set of excluded patterns in the .sourceignore format
                        (which is the same as .gitignore). If not provided, a default will be used,
                        consult the documentation for your version to find out what those are.
                      type: string
                    insecure:
                      description: Insecure allows connecting to a non-TLS HTTP container
                        registry.
                      type: boolean
                    interval:
                      description: |-
                        Interval at which the OCIRepository URL is checked for updates.
                        This interval is approximate and may be subject to jitter to ensure
                        efficient use of resources.
                      pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                      type: string
                    newPrefix:
                      description: The prefix part will be replaced by this value.
                      type: string
                    oldPrefix:
                      description: All KuboCD package repository where the Url begin
                        by this value will be impacted.
                      type: string
                    provider:
                      description: |-
                        The source will be handled by a child fluxCD OciRepository resource, which will be created by this operator
                        All following fields will be replicated in this object
                        The provider used for authentication, can be 'aws', 'azure', 'gcp' or 'generic'.
                        When not specified, defaults to 'generic'.
                        -kubebuilder:default:=generic
                      enum:
                      - generic
                      - aws
                      - azure
                      - gcp
                      type: string
                    proxySecretRef:
                      description: |-
                        ProxySecretRef specifies the Secret containing the proxy configuration
                        to use while communicating with the container registry.
                      properties:
                        name:
                          description: Name of the referent.
                          type: string
                      required:
                      - name
                      type: object
                    secretRef:
                      description: |-
                        SecretRef contains the secret name containing the registry login
                        credentials to resolve image metadata.
                        The secret must be of type kubernetes.io/dockerconfigjson.
                      properties:
                        name:
                          description: Name of the referent.
                          type: string
                      required:
                      - name
                      type: object
                    serviceAccountName:
                      description: |-
                        ServiceAccountName is the name of the Kubernetes ServiceAccount used to authenticate
                        the image pull if the service account has attached pull secrets. For more information:
                        https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#add-imagepullsecrets-to-a-service-account
                      type: string
                    suspend:
                      description: This flag tells the controller to suspend the reconciliation
                        of this source.
                      type: boolean
                    timeout:
                      description: The timeout for remote OCI Repository operations
                        like pulling
                      pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m))+$
                      type: string
                    verify:
                      description: |-
                        Verify contains the secret name containing the trusted public keys
                        used to verify the signature and specifies which provider to use to check
                        whether OCI image is authentic.
                      properties:
                        matchOIDCIdentity:
                          description: |-
                            MatchOIDCIdentity specifies the identity matching criteria to use
                            while verifying an OCI artifact which was signed using Cosign keyless
                            signing. The artifact's identity is deemed to be verified if any of the
                            specified matchers match against the identity.
                          items:
                            description: |-
                              OIDCIdentityMatch specifies options for verifying the certificate identity,
                              i.e. the issuer and the subject of the certificate.
                            properties:
                              issuer:
                                description: |-
                                  Issuer specifies the regex pattern to match against to verify
                                  the OIDC issuer in the Fulcio certificate. The pattern must be a
                                  valid Go regular expression.
                                type: string
                              subject:
                                description: |-
                                  Subject specifies the regex pattern to match against to verify
                                  the identity subject in the Fulcio certificate. The pattern must
                                  be a valid Go regular expression.
                                type: string
                            required:
                            - issuer
                            - subject
                            type: object
                          type: array
                        provider:
                          default: cosign
                          description: Provider specifies the technology used to sign
                            the OCI Artifact.
                          enum:
                          - cosign
                          - notation
                          type: string
                        secretRef:
                          description: |-
                            SecretRef specifies the Kubernetes Secret containing the
                            trusted public keys.
                          properties:
                            name:
                              description: Name of the referent.
                              type: string
                          required:
                          - name
                          type: object
                      required:
                      - provider
                      type: object
                  required:
                  - newPrefix
                  - oldPrefix
                  type: object
                type: array
            type: object
          status:
            description: ConfigStatus defines the observed state of Config.
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.1
  name: contexts.kubocd.kubotal.io
spec:
  group: kubocd.kubotal.io
  names:
    kind: Context
    listKind: ContextList
    plural: contexts
    shortNames:
    - ctx
    - kcontext
    - kctx
    singular: context
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.description
      name: Description
      type: string
    - jsonPath: .status.parents
      name: Parents
      type: string
    - jsonPath: .status.phase
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Context is the Schema for the settings API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ContextSpec defines the desired state of Context.
            properties:
              abstract:
                description: |-
                  If true, to be used as a parent and not candidate to be referenced from a Release.
                  This is NOT enforced by the controller, but just for the usage of a potential front end
                  Default: false
                type: boolean
              context:
                description: |-
                  Context is a map of variables witches will be injected in the data model when rendering package template.
                  When merging setting, context merge is performed by patching 'oldest' one with the 'newest' one.
                  The 'oldest' are the deeper in the parents chain.
                  Then merging is performed with the parent array order.
                x-kubernetes-preserve-unknown-fields: true
              description:
                description: Short description. Single line only
                type: string
              parents:
                description: |-
                  Context can be merged together.
                  See each property description for more detail.
                  Default: []
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              protected:
                description: |-
                  If true, the webhook will prevent deletion
                  Default: false
                type: boolean
            type: object
          status:
            description: ContextStatus defines the observed state of Context.
            properties:
              context:
                description: |-
                  Context is the resulting context, after potential parent merging
                  if there is no parent, it is empty, so use the one from Spec.
                x-kubernetes-preserve-unknown-fields: true
              parents:
                description: |-
                  Parents is a string to list our parents. Not technically used, but intended to be displayed
                  as printcolumn
                type: string
              phase:
                type: string
            required:
            - phase
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.1
  name: releases.kubocd.kubotal.io
spec:
  group: kubocd.kubotal.io
  names:
    kind: Release
    listKind: ReleaseList
    plural: releases
    singular: release
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.package.repository
      name: Repository
      type: string
    - jsonPath: .spec.package.tag
      name: Tag
      type: string
    - jsonPath: .status.printContexts
      name: Contexts
      type: string
    - jsonPath: .status.phase
      name: Status
      type: string
    - jsonPath: .status.readyReleases
      name: Ready
      type: string
    - jsonPath: .status.missingDependency
      name: Wait
      type: string
    - jsonPath: .status.printProtected
      name: PRT
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .status.printDescription
      name: Description
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Release is the Schema for the releases API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ReleaseSpec defines the desired state of Release.
            properties:
              contexts:
                description: |-
                  To provide contextual variables
                  Refer to Context resource description for some explanation
                  Contexts are merged in the following order:
                  - The global default one (defined in Config)
                  - The namespace context (A context with a specific name, defined in config, present in the release namespace)
                  - This ordered list
                  Default: []
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              createNamespace:
                description: |-
                  If true, add  { install: { createNamespace: true } } to config map.
                  Must be set, as used in module.Render()
                  Default: false
                type: boolean
              debug:
                description: Group a set of parameters useful for debugging Release
                  and Package
                properties:
                  dumpContext:
                    description: |-
                      DumpContext instruct to save a representation of the context
                      in the Status. This for user debugging?
                    type: boolean
                  dumpParameters:
                    description: |-
                      DumpParameters instruct to save a representation of the parameters
                      in the Status. This for user debugging?
                    type: boolean
                type: object
              dependencies:
                description: |-
                  The roles we depend on. (appended to the one of the underlying package)
                  Default: []
                items:
                  type: string
                type: array
              description:
                description: Short description of this release. Single line only
                type: string
              package:
                description: The package to deploy
                properties:
                  certSecretRef:
                    description: |-
                      CertSecretRef can be given the name of a Secret containing
                      either or both of

                      - a PEM-encoded client certificate (`tls.crt`) and private
                      key (`tls.key`);
                      - a PEM-encoded CA certificate (`ca.crt`)

                      and whichever are supplied, will be used for connecting to the
                      registry. The client cert and key are useful if you are
                      authenticating with a certificate; the CA cert is useful if
                      you are using a self-signed server certificate. The Secret must
                      be of type `Opaque` or `kubernetes.io/tls`.

                      Note: Support for the `caFile`, `certFile` and `keyFile` keys have
                      been deprecated.
                    properties:
                      name:
                        description: Name of the referent.
                        type: string
                    required:
                    - name
                    type: object
                  ignore:
                    description: |-
                      Ignore overrides the set of excluded patterns in the .sourceignore format
                      (which is the same as .gitignore). If not provided, a default will be used,
                      consult the documentation for your version to find out what those are.
                    type: string
                  insecure:
                    description: Insecure allows connecting to a non-TLS HTTP container
                      registry.
                    type: boolean
                  interval:
                    default: 5m
                    description: |-
                      Interval at which the OCIRepository URL is checked for updates.
                      This interval is approximate and may be subject to jitter to ensure
                      efficient use of resources.
                    pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                    type: string
                  provider:
                    description: |-
                      The source will be handled by a child fluxCD OciRepository resource, which will be created by this operator
                      All following fields will be replicated in this object
                      The provider used for authentication, can be 'aws', 'azure', 'gcp' or 'generic'.
                      When not specified, defaults to 'generic'.
                      -kubebuilder:default:=generic
                    enum:
                    - generic
                    - aws
                    - azure
                    - gcp
                    type: string
                  proxySecretRef:
                    description: |-
                      ProxySecretRef specifies the Secret containing the proxy configuration
                      to use while communicating with the container registry.
                    properties:
                      name:
                        description: Name of the referent.
                        type: string
                    required:
                    - name
                    type: object
                  repository:
                    description: Part of OCI url oci://<repository>:<tag>
                    type: string
                  secretRef:
                    description: |-
                      SecretRef contains the secret name containing the registry login
                      credentials to resolve image metadata.
                      The secret must be of type kubernetes.io/dockerconfigjson.
                    properties:
                      name:
                        description: Name of the referent.
                        type: string
                    required:
                    - name
                    type: object
                  serviceAccountName:
                    description: |-
                      ServiceAccountName is the name of the Kubernetes ServiceAccount used to authenticate
                      the image pull if the service account has attached pull secrets. For more information:
                      https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#add-imagepullsecrets-to-a-service-account
                    type: string
                  suspend:
                    description: This flag tells the controller to suspend the reconciliation
                      of this source.
                    type: boolean
                  tag:
                    description: Part of OCI url oci://<repository>:<tag>
                    type: string
                  timeout:
                    default: 60s
                    description: The timeout for remote OCI Repository operations
                      like pulling, defaults to 60s.
                    pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m))+$
                    type: string
                  verify:
                    description: |-
                      Verify contains the secret name containing the trusted public keys
                      used to verify the signature and specifies which provider to use to check
                      whether OCI image is authentic.
                    properties:
                      matchOIDCIdentity:
                        description: |-
                          MatchOIDCIdentity specifies the identity matching criteria to use
                          while verifying an OCI artifact which was signed using Cosign keyless
                          signing. The artifact's identity is deemed to be verified if any of the
                          specified matchers match against the identity.
                        items:
                          description: |-
                            OIDCIdentityMatch specifies options for verifying the certificate identity,
                            i.e. the issuer and the subject of the certificate.
                          properties:
                            issuer:
                              description: |-
                                Issuer specifies the regex pattern to match against to verify
                                the OIDC issuer in the Fulcio certificate. The pattern must be a
                                valid Go regular expression.
                              type: string
                            subject:
                              description: |-
                                Subject specifies the regex pattern to match against to verify
                                the identity subject in the Fulcio certificate. The pattern must
                                be a valid Go regular expression.
                              type: string
                          required:
                          - issuer
                          - subject
                          type: object
                        type: array
                      provider:
                        default: cosign
                        description: Provider specifies the technology used to sign
                          the OCI Artifact.
                        enum:
                        - cosign
                        - notation
                        type: string
                      secretRef:
                        description: |-
                          SecretRef specifies the Kubernetes Secret containing the
                          trusted public keys.
                        properties:
                          name:
                            description: Name of the referent.
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - provider
                    type: object
                required:
                - interval
                - repository
                - tag
                type: object
              parameters:
                description: The Release configuration variables
                x-kubernetes-preserve-unknown-fields: true
              protected:
                description: |-
                  If true, the webhook will prevent deletion
                  Default: false
                type: boolean
              roles:
                description: |-
                  List of roles fulfilled by this release. (appended to the one of the underlying package)
                  Default: []
                items:
                  type: string
                type: array
              skipDefaultContext:
                description: |-
                  If yes, the default context(s) of the configs are not taken in account
                  ,Default: false
                type: boolean
              specPatchByModule:
                additionalProperties:
                  x-kubernetes-preserve-unknown-fields: true
                description: Allow to patch the HelmRelease.spec for each module
                type: object
              suspended:
                description: |-
                  If true, HelmRelease update is suspended at KuboCD level
                  (This is NOT the helmRelease.spec.suspend flag, which may be set by Config part)
                  Default: false
                type: boolean
              targetNamespace:
                description: |-
                  The namespace to deploy in. (May also be a partial name for a multi-namespaces package)
                  Not required, as it can be setup another way, depending on the package
                  (i.e. the package has a fixed namespace, or several ones).
                  Default: Release.metadata.namespace
                type: string
            required:
            - package
            type: object
          status:
            description: |-
              ReleaseStatus defines the observed state of Release.
              As we want Status to be explicit about provided information, we don't use 'omitempty' in its definition.
              (Except for 'context', as controlled by a debug flag)
            properties:
              context:
                description: Context is the resulting context, if requested in debug
                  options
                x-kubernetes-preserve-unknown-fields: true
              dependencies:
                description: The result of the package template and release value
                items:
                  type: string
                type: array
              helmReleaseStates:
                additionalProperties:
                  description: HelmReleaseState describe the observed state of a child
                    HelmRelease
                  properties:
                    ready:
                      type: string
                    status:
                      type: string
                  required:
                  - ready
                  type: object
                description: HelmReleaseState describe the observed state of child
                  HelmReleases by name
                type: object
              missingDependency:
                type: string
              parameters:
                description: Parameters is the resulting parameters set, if requested
                  in debug options
                x-kubernetes-preserve-unknown-fields: true
              phase:
                type: string
              printContexts:
                description: |-
                  PrintContextsContexts is a string to list our context. Not technically used, but intended to be displayed
                  as printcolumn
                type: string
              printDescription:
                description: |-
                  PrintDescription
                  Copy of the release description, or, if empty the (templated) package one
                type: string
              printProtected:
                description: PrintProtected is a copy of Protected, with a Y/n flag.
                  To be used in display
                type: string
              protected:
                description: |-
                  Protected result of Release.spec.protected defaulted to package.spec.protected
                  It is the value checked by the webhook
                type: boolean
              readyReleases:
                description: |-
                  ReadyReleases is a string to display X/Y helmRelease ready. Not technically used, but intended to be displayed
                  as printcolumn
                type: string
              roles:
                description: The result of the package template and release value
                items:
                  type: string
                type: array
              usage:
                additionalProperties:
                  type: string
                description: |-
                  Usage is the rendering of the Package.spec.usage[key]. Aimed to provide user information.
                  Key could 'html', 'text', some language id, etc...
                type: object
            required:
            - dependencies
            - missingDependency
            - phase
            - printProtected
            - protected
            - readyReleases
            - roles
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---

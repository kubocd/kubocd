version: 2

before:
  hooks:
    - go mod tidy

builds:

  - id: kubocd
    main: cmd/kubocd/main.go
    binary: kubocd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

release:
  prerelease: "true"

archives:
  - id: kubocd
    formats:
      - binary
    builds:
      - kubocd
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      kubocd_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

changelog:
  disable: true


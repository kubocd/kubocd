  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubocd
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: kubocd
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        command:
        - /manager
        image: quay.io/kubocd/kcd-controller:0.1.0-snapshot
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: kubocd-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: webhook-certs
        secret:
          secretName: webhook-server-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: kubocd
  name: kubocd-metrics-certs
  namespace: kubocd-system
spec:
  dnsNames:
  - kubocd-controller-manager-metrics-service.kubocd-system.svc
  - kubocd-controller-manager-metrics-service.kubocd-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: kubocd-selfsigned-issuer
  secretName: metrics-server-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: kubocd
  name: kubocd-serving-cert
  namespace: kubocd-system
spec:
  dnsNames:
  - kubocd-webhook-service.kubocd-system.svc
  - kubocd-webhook-service.kubocd-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: kubocd-selfsigned-issuer
  secretName: webhook-server-cert
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: kubocd
  name: kubocd-selfsigned-issuer
  namespace: kubocd-system
spec:
  selfSigned: {}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: kubocd-system/kubocd-serving-cert
  name: kubocd-mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: kubocd-webhook-service
      namespace: kubocd-system
      path: /mutate-kubocd-kubotal-io-v1alpha1-release
  failurePolicy: Fail
  name: mrelease-v1alpha1.kb.io
  rules:
  - apiGroups:
    - kubocd.kubotal.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - releases
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: kubocd-system/kubocd-serving-cert
  name: kubocd-validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: kubocd-webhook-service
      namespace: kubocd-system
      path: /validate-kubocd-kubotal-io-v1alpha1-release
  failurePolicy: Fail
  name: vrelease-v1alpha1.kb.io
  rules:
  - apiGroups:
    - kubocd.kubotal.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - releases
  sideEffects: None
